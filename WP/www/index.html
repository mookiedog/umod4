<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Umod4 Data Logger</title>
    <link rel="icon" href="data:,">
    <link rel="stylesheet" href="/style.css">
    <style>
        body { max-width: 500px; }
        .container { border-radius: 20px; }
        .title-group { display: flex; align-items: baseline; gap: 6px; }
        :root {
            --wifi-off: #c0c0c0;
            --wifi-sta: #4CAF50;
            --wifi-ap:  #9C27B0;
        }
        .wifi-icon .bar-1 { fill: var(--wifi-off); }
        .wifi-icon .bar-2,
        .wifi-icon .bar-3,
        .wifi-icon .bar-4 { fill: none; stroke: var(--wifi-off); stroke-width: 2.5; stroke-linecap: round; }
        .wifi-icon.sig-1 .bar-1 { fill: var(--wifi-color); }
        .wifi-icon.sig-2 .bar-1 { fill: var(--wifi-color); }
        .wifi-icon.sig-2 .bar-2 { stroke: var(--wifi-color); }
        .wifi-icon.sig-3 .bar-1 { fill: var(--wifi-color); }
        .wifi-icon.sig-3 .bar-2 { stroke: var(--wifi-color); }
        .wifi-icon.sig-3 .bar-3 { stroke: var(--wifi-color); }
        .wifi-icon.sig-4 .bar-1 { fill: var(--wifi-color); }
        .wifi-icon.sig-4 .bar-2 { stroke: var(--wifi-color); }
        .wifi-icon.sig-4 .bar-3 { stroke: var(--wifi-color); }
        .wifi-icon.sig-4 .bar-4 { stroke: var(--wifi-color); }
        .wifi-icon.mode-sta { --wifi-color: var(--wifi-sta); }
        .wifi-icon.mode-ap  { --wifi-color: var(--wifi-ap); }
        .controls {
            padding: 20px 20px 10px;
            display: flex;
            flex-direction: column;
            gap: 10px;
        }
        .nav-button {
            display: block;
            width: 100%;
            padding: 16px;
            background: #007bff;
            color: white;
            text-decoration: none;
            border-radius: 10px;
            font-size: 1.1em;
            font-weight: 600;
            text-align: center;
            box-sizing: border-box;
        }
        .nav-button.green  { background: #28a745; }
        .nav-button.orange { background: #fd7e14; }
        .footer {
            padding: 10px 20px 20px;
            text-align: center;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="hero">
            <div class="ribbon">
                <div class="title-group">
                    <span class="ribbon-title">Umod4</span>
                    <span class="ribbon-subtitle">Logger</span>
                </div>
                <div class="ribbon-status">
                    <a href="/status.html" class="ribbon-icon-link" title="Device Status">
                        <svg viewBox="0 0 24 24" width="20" height="20" xmlns="http://www.w3.org/2000/svg">
                            <path fill="#333" d="M19.14 12.94c.04-.3.06-.61.06-.94s-.02-.64-.07-.94l2.03-1.58c.18-.14.23-.41.12-.61l-1.92-3.32c-.12-.22-.37-.29-.59-.22l-2.39.96c-.5-.38-1.03-.7-1.62-.94l-.36-2.54c-.04-.24-.24-.41-.48-.41h-3.84c-.24 0-.43.17-.47.41l-.36 2.54c-.59.24-1.13.56-1.62.94l-2.39-.96c-.22-.08-.47 0-.59.22L2.74 8.87c-.12.21-.08.47.12.61l2.03 1.58c-.05.3-.07.62-.07.94s.02.64.07.94l-2.03 1.58c-.18.14-.23.41-.12.61l1.92 3.32c.12.22.37.29.59.22l2.39-.96c.5.38 1.03.7 1.62.94l.36 2.54c.05.24.24.41.48.41h3.84c.24 0 .44-.17.47-.41l.36-2.54c.59-.24 1.13-.56 1.62-.94l2.39.96c.22.08.47 0 .59-.22l1.92-3.32c.12-.22.07-.47-.12-.61l-2.01-1.58zM12 15.6c-1.98 0-3.6-1.62-3.6-3.6s1.62-3.6 3.6-3.6 3.6 1.62 3.6 3.6-1.62 3.6-3.6 3.6z"/>
                        </svg>
                    </a>
                    <a href="/wifi_config.html" class="ribbon-icon-link" title="WiFi">
                        <svg id="wifi-icon" class="wifi-icon" viewBox="0 0 24 24" width="20" height="20" xmlns="http://www.w3.org/2000/svg">
                            <circle class="bar-1" cx="12" cy="19" r="2" />
                            <path class="bar-2" d="M16.5 14.5c-2.5-2-6.5-2-9 0" />
                            <path class="bar-3" d="M20 11c-4.5-3.5-11.5-3.5-16 0" />
                            <path class="bar-4" d="M1 7.5C6.5 3 17.5 3 23 7.5" />
                        </svg>
                    </a>
                    <div class="device-id" id="device-name"></div>
                </div>
            </div>
        </div>

        <div class="controls">
            <a href="/eprom_info.html" class="nav-button green">EPROM Management</a>
            <a href="/ecu_live.html" class="nav-button orange">Live Stream</a>
            <a href="/sd_info.html" id="sd-btn" class="nav-button" style="background:#17a2b8;">Filesystem</a>
            <a href="/ep_stdio.html" class="nav-button" style="background:#6f42c1;">EP Boot Log</a>
        </div>

        <div class="footer">
            <a href="https://github.com/mookiedog/umod4" target="_blank" rel="noopener">
                <img src="/proudly_made_160x160.jpg" alt="Proudly Made" style="width: 80px; height: 80px;">
            </a>
        </div>
    </div>
    <script>
        fetch('/api/info')
            .then(function(r) { return r.json(); })
            .then(function(d) {
                if (d.device_name) document.getElementById('device-name').textContent = d.device_name;
                var btn = document.getElementById('sd-btn');
                if (d.fs_status === 'no_card') {
                    btn.textContent = '\u26A0 No SD Card Inserted';
                    btn.style.background = '#dc3545';
                } else if (d.fs_status === 'mount_failed') {
                    btn.textContent = '\u26A0 SD Card Error';
                    btn.style.background = '#dc3545';
                }

                // Update WiFi icon
                var icon = document.getElementById('wifi-icon');
                var mode = d.wifi_mode; // "sta", "ap", or "disconnected"
                var rssi = d.wifi_rssi || 0;
                icon.classList.remove('mode-sta', 'mode-ap', 'sig-1', 'sig-2', 'sig-3', 'sig-4');
                if (mode === 'sta') {
                    icon.classList.add('mode-sta');
                    // Map RSSI to bars: >= -55 = 4, >= -67 = 3, >= -78 = 2, else = 1
                    icon.classList.add(rssi >= -55 ? 'sig-4' : rssi >= -67 ? 'sig-3' : rssi >= -78 ? 'sig-2' : 'sig-1');
                } else if (mode === 'ap') {
                    icon.classList.add('mode-ap', 'sig-4');
                }
                // disconnected: no mode/sig classes → all bars stay grey
            })
            .catch(function() {});
    </script>
</body>
</html>
