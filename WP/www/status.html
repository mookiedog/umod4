<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>umod4 - Status</title>
    <link rel="icon" href="data:,">
    <link rel="stylesheet" href="/style.css">
    <style>
        .section {
            margin-bottom: 28px;
        }
        .section-title {
            font-weight: 700;
            color: #555;
            font-size: 0.85em;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            margin-bottom: 12px;
            padding-bottom: 6px;
            border-bottom: 1px solid #eee;
        }
        .form-row {
            margin-bottom: 14px;
        }
        label {
            display: block;
            font-size: 0.9em;
            color: #555;
            margin-bottom: 4px;
        }
        .readonly-value {
            padding: 10px 12px;
            font-size: 1em;
            color: #333;
        }
        .readonly-link {
            padding: 10px 12px;
            font-size: 1em;
            color: #333;
        }
        .reboot-btn {
            display: block;
            width: 100%;
            margin-top: 28px;
            padding: 14px;
            background: #dc3545;
            color: white;
            border: none;
            border-radius: 6px;
            font-size: 1em;
            font-weight: 600;
            cursor: pointer;
            box-sizing: border-box;
        }
        .reboot-btn:disabled { background: #aaa; cursor: default; }
    </style>
</head>
<body>
    <div class="container">
        <div class="hero">
            <div class="ribbon">
                <span class="ribbon-title">Status</span>
                <div class="ribbon-status">
                    <a href="/" class="ribbon-icon-link" title="Home">
                        <svg viewBox="0 0 24 24" width="20" height="20"><path fill="#333" d="M10 20v-6h4v6h5v-8h3L12 3 2 12h3v8z"/></svg>
                    </a>
                    <div class="device-id" id="device-name"></div>
                </div>
            </div>
        </div>
        <div class="page-content">

        <div class="section">
            <div class="section-title">Device</div>
            <div class="form-row">
                <label>Device Name</label>
                <div class="readonly-value" id="device_name_display">--</div>
            </div>
            <div class="form-row">
                <label>MAC Address</label>
                <div class="readonly-value" id="mac">--</div>
            </div>
            <div class="form-row">
                <label>Uptime</label>
                <div class="readonly-value" id="uptime">--</div>
            </div>
        </div>

        <div class="section">
            <div class="section-title">Network</div>
            <div class="form-row">
                <label>Server Address</label>
                <div class="readonly-value" id="server_addr">Discovering&hellip;</div>
            </div>
        </div>

        <div class="form-row" style="margin-bottom: 28px;">
            <a href="/wifi_config.html" class="readonly-link" style="display:block; text-align:center; padding:14px; background:#6c757d; color:white; border-radius:6px; font-weight:600; text-decoration:none;">Settings</a>
        </div>

        <button class="reboot-btn" id="reboot-btn" onclick="doReboot()">Reboot Device</button>

        </div>
    </div>

    <script>
        function fmtUptime(s) {
            var d = Math.floor(s / 86400);
            var h = Math.floor((s % 86400) / 3600);
            var m = Math.floor((s % 3600) / 60);
            var sec = s % 60;
            var pad = function(n) { return String(n).padStart(2, '0'); };
            if (d > 0) return d + 'd ' + pad(h) + ':' + pad(m) + ':' + pad(sec);
            return pad(h) + ':' + pad(m) + ':' + pad(sec);
        }

        function updateStatus() {
            fetch('/api/info')
                .then(function(r) { return r.json(); })
                .then(function(data) {
                    if (data.device_name) {
                        document.getElementById('device-name').textContent = data.device_name;
                        document.getElementById('device_name_display').textContent = data.device_name;
                    }
                    document.getElementById('uptime').textContent = fmtUptime(data.uptime_seconds);
                    document.getElementById('mac').textContent = data.device_mac || 'Unknown';
                })
                .catch(function() {});
        }

        // Load server address from config on page load
        fetch('/api/config')
            .then(function(r) { return r.json(); })
            .then(function(data) {
                var addr = (data.server_host && data.server_port)
                    ? data.server_host + ':' + data.server_port
                    : (data.server_host || 'Not yet discovered');
                document.getElementById('server_addr').textContent = addr;
            })
            .catch(function() {});

        function doReboot() {
            if (!confirm('Reboot the device?')) return;
            var btn = document.getElementById('reboot-btn');
            btn.disabled = true;
            btn.textContent = 'Rebooting...';
            fetch('/api/reboot')
                .then(function(r) { return r.json(); })
                .then(function(data) {
                    if (data.success) {
                        btn.textContent = 'Rebooted \u2014 reconnecting...';
                    } else {
                        btn.textContent = 'Reboot failed: ' + (data.error || 'unknown error');
                        btn.disabled = false;
                    }
                })
                .catch(function() {
                    btn.textContent = 'Rebooted \u2014 reconnecting...';
                });
        }

        updateStatus();
        setInterval(updateStatus, 2000);
    </script>
</body>
</html>
